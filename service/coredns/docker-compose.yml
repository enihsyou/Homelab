services:
  init:
    # Seed local files into a volume to decouple from the CIFS mount,
    # ensuring availability even if the remote share goes offline.
    container_name: coredns-init
    image: alpine
    volumes:
      - ./:/src:ro
      - app-data:/app
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /src/Corefile /app/Corefile

  coredns:
    container_name: coredns
    image: coredns/coredns:latest
    restart: always
    networks:
      docker:
        ipv4_address: 192.168.2.53
        mac_address: 02:42:ac:22:00:02
    volumes:
      - app-data:/app:ro
    command: -conf /app/Corefile
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai

networks:
  docker:
    # To create the macvlan network, run the following command:
    # docker network create -d macvlan --ipv6 \
    #   -o parent=ens19 \
    #   --subnet=192.168.2.0/24 --gateway=192.168.2.1 --ip-range=192.168.2.128/25 \
    #   docker
    external: true

volumes:
   app-data:
