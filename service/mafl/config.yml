# Mafl 仪表盘配置
# 修改后需要 task recreate:mafl 重新构建镜像才能生效
title: Kokomi Network Homelab服务一览
lang: zh

tags:
  - name: Internet
    color: blue
  - name: Intranet
    color: amber

services:
  docker (docker.pve.kokomi.site):
    - title: Home Assistant
      description: 家庭自动化
      link: http://homeassistant.docker:8123/
      icon:
        name: simple-icons:homeassistant
        wrap: true
        color: "#3dbcf3"
      tags:
        - Intranet
      status:
        enabled: true

    - title: Apprise
      description: 通知聚合服务
      link: http://apprise.docker/
      icon:
        name: mdi:bell-notification
        wrap: true
      tags:
        - Internet
      status:
        enabled: true

    - title: Mafl
      description: 仪表盘 (本身)
      link: http://mafl.docker:3000/
      icon:
        name: mdi:view-dashboard
        wrap: true
      tags:
        - Intranet
      status:
        enabled: true

    - title: OpenList
      description: 文件列表程序
      link: https://list.home.kokomi.site/
      icon:
        name: simple-icons:alist
        wrap: true
        color: "#42b883"
      tags:
        - Internet
      status:
        enabled: true

